<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizza Box Design - Schmid</title>
  <style>
    body {
      margin: 0;
      background: #2c2c2c;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Georgia, serif;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    h1 {
      color: #d4a574;
      margin-bottom: 30px;
      letter-spacing: 3px;
      font-weight: normal;
    }
    .box-preview {
      background: #f5f0eb;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      display: inline-block;
    }
    img {
      max-width: 600px;
      width: 100%;
      height: auto;
    }
    .info {
      color: #a08060;
      margin-top: 25px;
      font-size: 14px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pizza Box Design Preview</h1>
    <div class="box-preview">
      <img src="pizza-box-design.svg" alt="Schmid Pizza Box Design">
    </div>
    <p class="info">Pizzeria Schmid &mdash; Mit Herzblut geSCHMIDet</p>
  </div>
</body>
</html>
