<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Kraft paper texture -->
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#d4a574" surfaceScale="2" result="light">
        <feDistantLight azimuth="45" elevation="55"/>
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="light" operator="multiply"/>
    </filter>

    <!-- Subtle grain overlay -->
    <filter id="grain">
      <feTurbulence type="turbulence" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" operator="atop"/>
    </filter>

    <!-- Fire glow for oven -->
    <radialGradient id="fireGlow" cx="50%" cy="65%" r="35%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>

    <!-- Stamp effect -->
    <filter id="stamp">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Background - Kraft paper -->
  <rect width="800" height="800" fill="#d4a574" rx="8"/>
  <rect width="800" height="800" fill="#c9956a" opacity="0.3" filter="url(#grain)" rx="8"/>

  <!-- Outer decorative border -->
  <rect x="25" y="25" width="750" height="750" fill="none" stroke="#5c2d0e" stroke-width="3" rx="6" opacity="0.7"/>
  <rect x="32" y="32" width="736" height="736" fill="none" stroke="#5c2d0e" stroke-width="1" rx="4" opacity="0.5"/>

  <!-- Corner ornaments - wheat/grain decorative elements -->
  <!-- Top-left -->
  <g transform="translate(50, 50)" opacity="0.6">
    <path d="M0,30 Q15,15 30,0" fill="none" stroke="#5c2d0e" stroke-width="2"/>
    <ellipse cx="8" cy="22" rx="4" ry="8" fill="none" stroke="#5c2d0e" stroke-width="1.5" transform="rotate(-45,8,22)"/>
    <ellipse cx="18" cy="12" rx="4" ry="8" fill="none" stroke="#5c2d0e" stroke-width="1.5" transform="rotate(-45,18,12)"/>
  </g>
  <!-- Top-right -->
  <g transform="translate(750, 50) scale(-1,1)" opacity="0.6">
    <path d="M0,30 Q15,15 30,0" fill="none" stroke="#5c2d0e" stroke-width="2"/>
    <ellipse cx="8" cy="22" rx="4" ry="8" fill="none" stroke="#5c2d0e" stroke-width="1.5" transform="rotate(-45,8,22)"/>
    <ellipse cx="18" cy="12" rx="4" ry="8" fill="none" stroke="#5c2d0e" stroke-width="1.5" transform="rotate(-45,18,12)"/>
  </g>
  <!-- Bottom-left -->
  <g transform="translate(50, 750) scale(1,-1)" opacity="0.6">
    <path d="M0,30 Q15,15 30,0" fill="none" stroke="#5c2d0e" stroke-width="2"/>
    <ellipse cx="8" cy="22" rx="4" ry="8" fill="none" stroke="#5c2d0e" stroke-width="1.5" transform="rotate(-45,8,22)"/>
    <ellipse cx="18" cy="12" rx="4" ry="8" fill="none" stroke="#5c2d0e" stroke-width="1.5" transform="rotate(-45,18,12)"/>
  </g>
  <!-- Bottom-right -->
  <g transform="translate(750, 750) scale(-1,-1)" opacity="0.6">
    <path d="M0,30 Q15,15 30,0" fill="none" stroke="#5c2d0e" stroke-width="2"/>
    <ellipse cx="8" cy="22" rx="4" ry="8" fill="none" stroke="#5c2d0e" stroke-width="1.5" transform="rotate(-45,8,22)"/>
    <ellipse cx="18" cy="12" rx="4" ry="8" fill="none" stroke="#5c2d0e" stroke-width="1.5" transform="rotate(-45,18,12)"/>
  </g>

  <!-- Top banner ribbon -->
  <g transform="translate(400, 78)">
    <path d="M-180,0 L-160,-18 L160,-18 L180,0 L160,18 L-160,18 Z" fill="#8b1a1a" opacity="0.85"/>
    <path d="M-180,0 L-160,-18 L160,-18 L180,0 L160,18 L-160,18 Z" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
    <text x="0" y="6" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#ffd700" letter-spacing="4" font-variant="small-caps">Pizzeria Artigianale</text>
  </g>

  <!-- Main circular design area -->
  <circle cx="400" cy="385" r="220" fill="none" stroke="#5c2d0e" stroke-width="2.5" opacity="0.6"/>
  <circle cx="400" cy="385" r="210" fill="none" stroke="#5c2d0e" stroke-width="1" opacity="0.4" stroke-dasharray="4,6"/>
  <circle cx="400" cy="385" r="200" fill="none" stroke="#5c2d0e" stroke-width="1.5" opacity="0.5"/>

  <!-- Fire glow behind pizza oven -->
  <circle cx="400" cy="350" r="140" fill="url(#fireGlow)"/>

  <!-- Pizza oven illustration -->
  <g transform="translate(400, 310)">
    <!-- Oven dome -->
    <path d="M-95,40 Q-95,-60 0,-75 Q95,-60 95,40" fill="#8b4513" stroke="#5c2d0e" stroke-width="2.5" opacity="0.85"/>
    <!-- Oven interior -->
    <path d="M-75,40 Q-75,-40 0,-52 Q75,-40 75,40" fill="#2d1810" stroke="none"/>
    <!-- Fire inside oven -->
    <g opacity="0.9">
      <path d="M-20,35 Q-15,10 -8,20 Q-5,-5 0,15 Q5,-5 8,20 Q15,10 20,35" fill="#ff6b35"/>
      <path d="M-12,35 Q-8,18 -3,25 Q0,8 3,25 Q8,18 12,35" fill="#ffd700" opacity="0.8"/>
      <path d="M-5,35 Q-2,22 0,28 Q2,22 5,35" fill="#fff5e6" opacity="0.6"/>
    </g>
    <!-- Oven mouth arch -->
    <path d="M-80,40 Q-80,-35 0,-48 Q80,-35 80,40" fill="none" stroke="#d4a574" stroke-width="3"/>
    <!-- Oven base -->
    <rect x="-105" y="38" width="210" height="12" fill="#8b4513" stroke="#5c2d0e" stroke-width="1.5" rx="2"/>
    <!-- Chimney -->
    <rect x="-12" y="-85" width="24" height="20" fill="#8b4513" stroke="#5c2d0e" stroke-width="1.5" rx="2"/>
    <rect x="-16" y="-90" width="32" height="8" fill="#8b4513" stroke="#5c2d0e" stroke-width="1.5" rx="2"/>
    <!-- Small smoke wisps -->
    <g opacity="0.3" fill="none" stroke="#5c2d0e" stroke-width="1.5">
      <path d="M-5,-95 Q-10,-110 -3,-125 Q4,-140 -2,-155"/>
      <path d="M5,-95 Q10,-115 3,-130 Q-4,-145 2,-160"/>
    </g>
  </g>

  <!-- Pizza peel with pizza -->
  <g transform="translate(400, 395)">
    <!-- Peel handle -->
    <rect x="-6" y="15" width="12" height="70" fill="#c9956a" stroke="#5c2d0e" stroke-width="1.5" rx="3"/>
    <rect x="-4" y="80" width="8" height="15" fill="#a0784a" stroke="#5c2d0e" stroke-width="1" rx="2"/>
    <!-- Peel paddle -->
    <ellipse cx="0" cy="0" rx="55" ry="38" fill="#deb887" stroke="#5c2d0e" stroke-width="1.5"/>
    <!-- Pizza on peel -->
    <ellipse cx="0" cy="-2" rx="42" ry="30" fill="#e8c170"/>
    <!-- Sauce -->
    <ellipse cx="0" cy="-2" rx="35" ry="24" fill="#c0392b" opacity="0.7"/>
    <!-- Cheese spots -->
    <ellipse cx="-12" cy="-10" rx="8" ry="5" fill="#f5deb3" opacity="0.8"/>
    <ellipse cx="10" cy="-5" rx="9" ry="6" fill="#f5deb3" opacity="0.7"/>
    <ellipse cx="-5" cy="8" rx="7" ry="5" fill="#f5deb3" opacity="0.75"/>
    <ellipse cx="15" cy="10" rx="6" ry="4" fill="#f5deb3" opacity="0.7"/>
    <!-- Basil leaves -->
    <g fill="#2d8b46" opacity="0.8">
      <ellipse cx="-15" cy="2" rx="4" ry="2.5" transform="rotate(-30,-15,2)"/>
      <ellipse cx="8" cy="-12" rx="3.5" ry="2" transform="rotate(20,8,-12)"/>
      <ellipse cx="5" cy="12" rx="4" ry="2.5" transform="rotate(-15,5,12)"/>
    </g>
    <!-- Crust edge highlight -->
    <ellipse cx="0" cy="-2" rx="42" ry="30" fill="none" stroke="#d4a050" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Decorative Italian flag ribbon under oven -->
  <g transform="translate(400, 480)">
    <rect x="-60" y="0" width="40" height="6" fill="#008C45" rx="1" opacity="0.7"/>
    <rect x="-20" y="0" width="40" height="6" fill="#F4F5F0" rx="0" opacity="0.7"/>
    <rect x="20" y="0" width="40" height="6" fill="#CD212A" rx="1" opacity="0.7"/>
  </g>

  <!-- Blacksmith anvil & hammer icon (Schmid reference) -->
  <g transform="translate(400, 520)" opacity="0.65">
    <!-- Anvil -->
    <path d="M-18,8 L-14,-2 L14,-2 L18,8 L12,8 L10,4 L-10,4 L-12,8 Z" fill="#5c2d0e" stroke="#3d1a06" stroke-width="1"/>
    <!-- Hammer -->
    <line x1="-8" y1="-2" x2="4" y2="-14" stroke="#5c2d0e" stroke-width="2" stroke-linecap="round"/>
    <rect x="2" y="-20" width="12" height="8" fill="#5c2d0e" stroke="#3d1a06" stroke-width="1" rx="1" transform="rotate(30,8,-16)"/>
  </g>

  <!-- Main slogan -->
  <g transform="translate(400, 570)">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#5c2d0e" letter-spacing="2" opacity="0.6">~ con amore ~</text>
  </g>

  <!-- MAIN HEADLINE: Mit Herzblut geSCHMIDet -->
  <g transform="translate(400, 620)">
    <!-- Decorative line left -->
    <line x1="-280" y1="0" x2="-180" y2="0" stroke="#5c2d0e" stroke-width="1" opacity="0.4"/>
    <circle cx="-175" cy="0" r="3" fill="#5c2d0e" opacity="0.4"/>
    <!-- Decorative line right -->
    <line x1="180" y1="0" x2="280" y2="0" stroke="#5c2d0e" stroke-width="1" opacity="0.4"/>
    <circle cx="175" cy="0" r="3" fill="#5c2d0e" opacity="0.4"/>

    <!-- Heart icon -->
    <g transform="translate(-165, -2) scale(0.6)">
      <path d="M0,-10 C-5,-20 -20,-20 -20,-10 C-20,0 0,15 0,15 C0,15 20,0 20,-10 C20,-20 5,-20 0,-10Z" fill="#8b1a1a" opacity="0.8"/>
    </g>

    <!-- "Mit Herzblut" -->
    <text x="-80" y="8" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#5c2d0e" font-style="italic" letter-spacing="1">Mit Herzblut</text>

    <!-- "geSCHMIDet" with SCHMID highlighted -->
    <text x="100" y="8" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#5c2d0e" font-style="italic">ge<tspan font-weight="bold" fill="#8b1a1a" font-size="33" font-style="normal" letter-spacing="2">SCHMID</tspan>et</text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(400, 660)">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#5c2d0e" letter-spacing="6" opacity="0.6" font-variant="small-caps">Handgemachte Neapolitan Pizza</text>
  </g>

  <!-- Decorative wheat/laurel branches at bottom -->
  <g transform="translate(400, 710)" opacity="0.5">
    <!-- Left branch -->
    <path d="M-10,0 Q-40,-5 -80,10" fill="none" stroke="#5c2d0e" stroke-width="1.5"/>
    <ellipse cx="-30" cy="-3" rx="8" ry="3.5" fill="none" stroke="#5c2d0e" stroke-width="1" transform="rotate(-10,-30,-3)"/>
    <ellipse cx="-48" cy="0" rx="8" ry="3.5" fill="none" stroke="#5c2d0e" stroke-width="1" transform="rotate(-5,-48,0)"/>
    <ellipse cx="-65" cy="5" rx="8" ry="3.5" fill="none" stroke="#5c2d0e" stroke-width="1" transform="rotate(5,-65,5)"/>
    <ellipse cx="-25" cy="6" rx="7" ry="3" fill="none" stroke="#5c2d0e" stroke-width="1" transform="rotate(15,-25,6)"/>
    <ellipse cx="-43" cy="9" rx="7" ry="3" fill="none" stroke="#5c2d0e" stroke-width="1" transform="rotate(10,-43,9)"/>
    <!-- Right branch -->
    <path d="M10,0 Q40,-5 80,10" fill="none" stroke="#5c2d0e" stroke-width="1.5"/>
    <ellipse cx="30" cy="-3" rx="8" ry="3.5" fill="none" stroke="#5c2d0e" stroke-width="1" transform="rotate(10,30,-3)"/>
    <ellipse cx="48" cy="0" rx="8" ry="3.5" fill="none" stroke="#5c2d0e" stroke-width="1" transform="rotate(5,48,0)"/>
    <ellipse cx="65" cy="5" rx="8" ry="3.5" fill="none" stroke="#5c2d0e" stroke-width="1" transform="rotate(-5,65,5)"/>
    <ellipse cx="25" cy="6" rx="7" ry="3" fill="none" stroke="#5c2d0e" stroke-width="1" transform="rotate(-15,25,6)"/>
    <ellipse cx="43" cy="9" rx="7" ry="3" fill="none" stroke="#5c2d0e" stroke-width="1" transform="rotate(-10,43,9)"/>
  </g>

  <!-- Bottom info line -->
  <g transform="translate(400, 755)">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#5c2d0e" letter-spacing="3" opacity="0.45">FAMIGLIA SCHMID  ·  DAL FORNO DI CASA  ·  CON TUTTO IL CUORE</text>
  </g>

</svg>