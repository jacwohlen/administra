name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create env file
        run: |
          echo 'PUBLIC_SUPABASE_DATABASE_URL=http://localhost:54321' >> .env
          echo 'PUBLIC_SUPABASE_ANON_KEY=placeholder' >> .env
          echo 'PUBLIC_SUPABASE_SITE_URL=http://localhost:5173' >> .env
          echo 'PUBLIC_MODE=DEV' >> .env

      - name: Lint
        run: npm run lint

      - name: Type check
        # Pre-existing Skeleton UI v0.x type mismatches — tracked in TODO.md
        continue-on-error: true
        run: npm run check

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create env file
        run: |
          echo 'PUBLIC_SUPABASE_DATABASE_URL=http://localhost:54321' >> .env
          echo 'PUBLIC_SUPABASE_ANON_KEY=placeholder' >> .env
          echo 'PUBLIC_SUPABASE_SITE_URL=http://localhost:5173' >> .env
          echo 'PUBLIC_MODE=DEV' >> .env

      - name: Unit tests
        run: npm run test:unit -- --run

  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create env file
        run: |
          echo 'PUBLIC_SUPABASE_DATABASE_URL=http://localhost:54321' >> .env
          echo 'PUBLIC_SUPABASE_ANON_KEY=placeholder' >> .env
          echo 'PUBLIC_SUPABASE_SITE_URL=http://localhost:5173' >> .env
          echo 'PUBLIC_MODE=DEV' >> .env

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (public only)
        run: npx playwright test --project=public

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-check, unit-tests]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create env file
        run: |
          echo 'PUBLIC_SUPABASE_DATABASE_URL=http://localhost:54321' >> .env
          echo 'PUBLIC_SUPABASE_ANON_KEY=placeholder' >> .env
          echo 'PUBLIC_SUPABASE_SITE_URL=http://localhost:5173' >> .env
          echo 'PUBLIC_MODE=DEV' >> .env

      - name: Build
        run: npm run build
