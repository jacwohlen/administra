name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create env file
        run: cp .env.example .env

      - name: Lint
        run: npm run lint

      - name: Type check
        # Pre-existing Skeleton UI v0.x type mismatches — tracked in TODO.md
        continue-on-error: true
        run: npm run check

      - name: Unit tests
        run: npm run test:unit -- --run

      - name: Build
        run: npm run build
